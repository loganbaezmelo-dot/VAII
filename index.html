<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAII - Virtual Assistant</title>
    <style>
        body {
            background-color: #121212 !important;
            color: #ffffff !important;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        header h1 {
            margin-bottom: 5px;
            font-size: 2.5rem;
            color: #ffffff;
        }
        header p {
            color: #888;
            margin-top: 0;
        }
        .widget {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: left;
            margin-top: 20px;
        }
        .widget h3 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .search-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        #weather-btn {
            background: #007bff;
        }
        #news-btn {
            background: #28a745;
        }
        .output-box {
            margin-top: 15px;
            padding: 12px;
            background: #252525;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #eee;
            max-height: 350px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>⚡ VAII</h1>
            <p>Virtual Assistant with Internet Integrations</p>
        </header>

        <main>
            <section class="widget" id="search-widget">
                <h3>🔍 Smart Assistant Hub</h3>
                <div class="search-container">
                    <input type="text" id="city-input" placeholder="Search city, topic, or country..." list="city-suggestions" autocomplete="off">
                    <div class="button-group">
                        <button id="weather-btn">Weather</button>
                        <!-- Renamed button to Info -->
                        <button id="news-btn">Info</button>
                    </div>
                </div>
                <datalist id="city-suggestions"></datalist>
                <div id="weather-output" class="output-box">Type above to fetch weather or latest info...</div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
