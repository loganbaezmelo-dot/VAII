<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAII - Virtual Assistant</title>
    <style>
        body {
            background-color: #121212 !important;
            color: #ffffff !important;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        header h1 {
            margin-bottom: 5px;
            font-size: 2.5rem;
            color: #ffffff;
        }
        header p {
            color: #888;
            margin-top: 0;
        }
        .widget {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: left;
            margin-top: 20px;
        }
        .widget h3 {
            color: #ffffff;
            margin-top: 0;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
        }
        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .output-box {
            margin-top: 15px;
            padding: 12px;
            background: #252525;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #eee;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>⚡ VAII</h1>
            <p>Virtual Assistant with Internet Integrations</p>
        </header>

        <main>
            <section class="widget" id="weather-section">
                <h3>🌤️ Live Weather</h3>
                <div class="input-group">
                    <!-- Added list link for autocomplete -->
                    <input type="text" id="city-input" value="Loughman, Florida" placeholder="Type a city..." list="city-suggestions" autocomplete="off">
                    <button id="weather-btn">Check</button>
                </div>
                <!-- Container for dropdown suggestions -->
                <datalist id="city-suggestions"></datalist>
                <div id="weather-output" class="output-box">Click check to fetch data...</div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
